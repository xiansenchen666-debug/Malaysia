<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuxeLife Malaysia</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['"Playfair Display"', 'serif'],
          },
          colors: {
            'luxe-bg': '#F9F7F3',
            'luxe-black': '#1C1C1C',
            'luxe-gold': '#C5A880',
            'luxe-gold-dark': '#A68A64',
            'luxe-gray': '#6B6B6B',
            'luxe-light-gray': '#E5E5E5',
            'glass-white': 'rgba(255, 255, 255, 0.7)',
            'glass-border': 'rgba(255, 255, 255, 0.5)',
            maxis: '#00A859',
            digi: '#FFCC00',
            celcom: '#00B9E8'
          },
          letterSpacing: {
            tighter: '-0.02em',
            widest: '0.1em',
          },
          boxShadow: {
            'luxe': '0 20px 40px -10px rgba(0,0,0,0.05)',
            'luxe-hover': '0 30px 60px -15px rgba(0,0,0,0.1)',
          },
          animation: {
            'spring': 'spring 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
          },
          keyframes: {
            spring: {
              '0%': { transform: 'scale(1)' },
              '50%': { transform: 'scale(0.98)' },
              '100%': { transform: 'scale(1)' },
            }
          }
        }
      }
    }
  </script>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>

  <!-- Custom Styles -->
  <style>
    body {
      background-color: #F9F7F3;
      color: #1C1C1C;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      background-image: radial-gradient(#E5E5E5 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* Staggered Fade-in */
    .stagger-item {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Reveal on Scroll */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }

    /* Glassmorphism - Light Mode */
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
    }

    /* Spring Button */
    .btn-spring {
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .btn-spring:active {
      transform: scale(0.98);
    }

    /* Number Rolling */
    .number-roll {
      display: inline-block;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Hide scrollbar for horizontal scroll */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Dynamic gradient background for Top-up */
    .bg-dynamic-gradient {
      transition: background 0.8s ease;
    }
  </style>
</head>
<body class="font-sans antialiased text-luxe-black min-h-screen flex flex-col selection:bg-luxe-gold selection:text-white">

  <div x-data="app()" x-init="initApp()">
    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl border-b border-gray-200 shadow-sm transition-all duration-300">
      <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
        <div class="flex items-center">
          <button x-show="currentPage !== 'home'" @click="goTo('home')" x-transition.opacity class="mr-4 p-2 -ml-2 text-luxe-gray hover:text-luxe-gold transition-colors rounded-full hover:bg-gray-100">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
          </button>
          <div class="font-serif font-bold text-2xl tracking-tight text-luxe-black cursor-pointer" @click="goTo('home')">LuxeLife</div>
        </div>
        
        <!-- Language Switcher -->
        <div class="relative" x-data="{ open: false }">
          <button @click="open = !open" class="btn-spring flex items-center space-x-2 text-sm font-medium text-luxe-gray hover:text-luxe-black transition-colors px-3 py-2 rounded-lg hover:bg-gray-100">
            <span x-text="languages[currentLang]"></span>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
          </button>
          <div x-show="open" @click.away="open = false" x-transition.opacity class="absolute right-0 mt-2 w-36 bg-white border border-gray-100 rounded-xl py-2 shadow-xl z-50">
            <template x-for="(name, code) in languages" :key="code">
              <button @click="currentLang = code; open = false" class="w-full text-left px-5 py-2.5 text-sm hover:bg-gray-50 transition-colors" :class="{'text-luxe-gold font-medium': currentLang === code, 'text-luxe-gray': currentLang !== code}">
                <span x-text="name"></span>
              </button>
            </template>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-32 pb-32 max-w-7xl mx-auto px-6 min-h-screen">
      
      <!-- Home Portal / Collection Page -->
      <section x-show="currentPage === 'home'" x-transition:enter="transition ease-out duration-700 delay-100" x-transition:enter-start="opacity-0 translate-y-10" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-300" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-10" class="pt-10">
        <div class="text-center mb-20">
          <p class="text-luxe-gold font-medium tracking-widest uppercase text-sm mb-4" x-text="t.welcomeSub"></p>
          <h1 class="font-serif text-5xl md:text-6xl font-bold text-luxe-black" x-text="t.welcomeTitle"></h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <!-- Top-up Card -->
          <div @click="goTo('topup')" class="glass-card p-10 group cursor-pointer hover:shadow-luxe-hover transition-all duration-500 border-gray-100 relative overflow-hidden bg-white/60">
            <div class="absolute top-0 right-0 w-40 h-40 bg-luxe-gold/10 rounded-bl-[100px] -mr-10 -mt-10 transition-transform duration-700 group-hover:scale-125"></div>
            <div class="relative z-10">
              <h3 class="font-serif text-3xl font-bold text-luxe-black mb-4" x-text="t.topupTitle"></h3>
              <p class="text-luxe-gray text-lg mb-8" x-text="t.topupDesc"></p>
              <div class="text-luxe-gold flex items-center text-sm font-bold uppercase tracking-widest">
                <span x-text="t.explore"></span>
                <svg class="w-5 h-5 ml-3 group-hover:translate-x-3 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
              </div>
            </div>
          </div>

          <!-- Ride Card -->
          <div @click="goTo('ride')" class="glass-card p-10 group cursor-pointer hover:shadow-luxe-hover transition-all duration-500 border-gray-100 relative overflow-hidden bg-white/60">
            <div class="absolute top-0 right-0 w-40 h-40 bg-luxe-black/5 rounded-bl-[100px] -mr-10 -mt-10 transition-transform duration-700 group-hover:scale-125"></div>
            <div class="relative z-10">
              <h3 class="font-serif text-3xl font-bold text-luxe-black mb-4" x-text="t.rideTitle"></h3>
              <p class="text-luxe-gray text-lg mb-8" x-text="t.rideDesc"></p>
              <div class="text-luxe-black flex items-center text-sm font-bold uppercase tracking-widest">
                <span x-text="t.explore"></span>
                <svg class="w-5 h-5 ml-3 group-hover:translate-x-3 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
              </div>
            </div>
          </div>

          <!-- Living Card -->
          <div @click="goTo('living')" class="glass-card p-10 group cursor-pointer hover:shadow-luxe-hover transition-all duration-500 border-gray-100 relative overflow-hidden bg-white/60">
            <div class="absolute top-0 right-0 w-40 h-40 bg-luxe-gray/5 rounded-bl-[100px] -mr-10 -mt-10 transition-transform duration-700 group-hover:scale-125"></div>
            <div class="relative z-10">
              <h3 class="font-serif text-3xl font-bold text-luxe-black mb-4" x-text="t.livingTitle"></h3>
              <p class="text-luxe-gray text-lg mb-8" x-text="t.livingDesc"></p>
              <div class="text-luxe-gray flex items-center text-sm font-bold uppercase tracking-widest group-hover:text-luxe-black transition-colors">
                <span x-text="t.explore"></span>
                <svg class="w-5 h-5 ml-3 group-hover:translate-x-3 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
              </div>
            </div>
          </div>

          <!-- Leisure Card -->
          <div @click="goTo('leisure')" class="glass-card p-10 group cursor-pointer hover:shadow-luxe-hover transition-all duration-500 border-gray-100 relative overflow-hidden bg-white/60">
            <div class="absolute top-0 right-0 w-40 h-40 bg-luxe-gold/10 rounded-bl-[100px] -mr-10 -mt-10 transition-transform duration-700 group-hover:scale-125"></div>
            <div class="relative z-10">
              <h3 class="font-serif text-3xl font-bold text-luxe-black mb-4" x-text="t.leisureTitle"></h3>
              <p class="text-luxe-gray text-lg mb-8" x-text="t.leisureDesc"></p>
              <div class="text-luxe-gold flex items-center text-sm font-bold uppercase tracking-widest">
                <span x-text="t.explore"></span>
                <svg class="w-5 h-5 ml-3 group-hover:translate-x-3 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Connectivity Hub (Top-up) -->
      <section x-show="currentPage === 'topup'" style="display: none;" x-transition:enter="transition ease-out duration-700 delay-100" x-transition:enter-start="opacity-0 translate-y-10" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-300" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-10" class="relative pt-10">
        <div class="text-center mb-16">
          <p class="text-luxe-gold font-medium tracking-widest uppercase text-sm mb-3">Stay Connected</p>
          <h2 class="font-serif text-4xl md:text-5xl font-bold text-luxe-black" x-text="t.topupTitle"></h2>
        </div>
        
        <div class="glass-card max-w-2xl mx-auto p-8 md:p-12 relative overflow-hidden bg-dynamic-gradient shadow-luxe" :style="`background: radial-gradient(circle at 100% 0%, ${telcoColor}15 0%, transparent 70%)`">
          <div class="relative z-10">
            <label class="block text-sm font-medium text-luxe-gray mb-3" x-text="t.enterNumber"></label>
            <div class="relative">
              <input type="text" x-model="phoneNumber" @input="detectTelco" placeholder="01X-XXXXXXX" class="w-full bg-white border border-gray-200 rounded-xl px-5 py-4 text-xl font-medium focus:outline-none focus:border-luxe-gold focus:ring-2 focus:ring-luxe-gold/20 transition-all text-luxe-black placeholder-gray-300 shadow-sm">
              <div class="absolute right-5 top-1/2 -translate-y-1/2 w-3 h-3 rounded-full transition-colors duration-500 shadow-sm" :style="`background-color: ${telcoColor}`"></div>
            </div>
            
            <div class="mt-10">
              <label class="block text-sm font-medium text-luxe-gray mb-4" x-text="t.selectAmount"></label>
              <div class="grid grid-cols-4 gap-3">
                <template x-for="amt in [10, 30, 50, 100]" :key="amt">
                  <button @click="topupAmount = amt" class="btn-spring py-4 rounded-xl text-center border transition-all duration-300" :class="topupAmount === amt ? 'border-luxe-gold bg-luxe-gold/10 text-luxe-gold font-semibold' : 'bg-white border-gray-200 text-luxe-gray hover:border-luxe-gold/50'">
                    RM <span x-text="amt"></span>
                  </button>
                </template>
              </div>
            </div>
            
            <button class="btn-spring mt-10 w-full bg-luxe-black text-white font-medium py-4 rounded-xl shadow-lg hover:shadow-xl hover:bg-gray-900 transition-all flex justify-center items-center space-x-2">
              <span x-text="t.payNow"></span>
              <span>RM</span>
              <span class="number-roll" x-data="{ current: 30 }" x-text="Math.round(current)" x-init="
                $watch('topupAmount', val => {
                  let start = current;
                  let end = val;
                  let startTime = performance.now();
                  let duration = 800;
                  const animate = (time) => {
                    let progress = (time - startTime) / duration;
                    if(progress > 1) progress = 1;
                    // Ease out expo
                    let ease = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
                    current = start + (end - start) * ease;
                    if(progress < 1) requestAnimationFrame(animate);
                  };
                  requestAnimationFrame(animate);
                });
              "></span>
            </button>
          </div>
        </div>
      </section>

      <!-- Elite Mobility (Ride) -->
      <section x-show="currentPage === 'ride'" style="display: none;" x-transition:enter="transition ease-out duration-700 delay-100" x-transition:enter-start="opacity-0 translate-y-10" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-300" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-10" class="relative h-[650px] rounded-[2.5rem] overflow-hidden shadow-luxe group mt-10">
        <!-- Static Map Background (Light Mode) -->
        <div class="absolute inset-0 bg-[url('https://api.mapbox.com/styles/v1/mapbox/light-v11/static/101.6869,3.1390,13,0/1200x800?access_token=pk.eyJ1IjoiZGVtbyIsImEiOiJjbGo1ZzB6NmEwMWY5M2Zwam9xcWFxYjB6In0.demotoken')] bg-cover bg-center transition-transform duration-1000 group-hover:scale-105"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-white via-white/80 to-transparent"></div>
        
        <div class="absolute inset-0 p-10 flex flex-col justify-between">
          <div>
            <p class="text-luxe-gold font-medium tracking-widest uppercase text-sm mb-3">Chauffeur Service</p>
            <h2 class="font-serif text-4xl md:text-5xl font-bold text-luxe-black mb-6" x-text="t.rideTitle"></h2>
            
            <div class="glass-card p-5 inline-block border-gray-100 shadow-sm">
              <div class="flex items-center space-x-4 text-sm">
                <div class="w-2.5 h-2.5 rounded-full bg-luxe-black"></div>
                <span class="font-medium text-luxe-black">Pavilion Bukit Bintang</span>
              </div>
              <div class="w-px h-8 bg-gray-200 ml-1.5 my-1"></div>
              <div class="flex items-center space-x-4 text-sm">
                <div class="w-2.5 h-2.5 rounded-full border-2 border-luxe-gold"></div>
                <input type="text" placeholder="Where to, Sir?" class="bg-transparent border-none outline-none placeholder-gray-400 text-luxe-black font-medium w-56 focus:ring-0">
              </div>
            </div>
          </div>
          
          <!-- Swipe Cards -->
          <div class="flex overflow-x-auto no-scrollbar space-x-5 pb-4 -mx-10 px-10">
            <template x-for="ride in rides" :key="ride.type">
              <div class="glass-card min-w-[300px] p-6 flex-shrink-0 cursor-pointer btn-spring transition-all border-gray-100" @click="selectedRide = ride.type" :class="selectedRide === ride.type ? 'border-luxe-gold ring-1 ring-luxe-gold shadow-lg' : 'hover:shadow-md'">
                <div class="flex justify-between items-start mb-6">
                  <div>
                    <h3 class="font-serif font-bold text-xl text-luxe-black" x-text="ride.type"></h3>
                    <p class="text-xs font-medium text-luxe-gray mt-1 uppercase tracking-wider" x-text="`ETA: ${ride.eta}`"></p>
                  </div>
                  <span class="text-lg font-bold text-luxe-gold" x-text="`RM ${ride.price}`"></span>
                </div>
                <div class="w-full h-28 bg-gray-50 rounded-xl flex items-center justify-center border border-gray-100 overflow-hidden relative">
                   <div class="absolute inset-0 bg-gradient-to-tr from-gray-100 to-transparent"></div>
                  <span class="text-xs text-luxe-gray font-semibold uppercase tracking-widest relative z-10" x-text="ride.class"></span>
                </div>
              </div>
            </template>
          </div>
        </div>
      </section>

      <!-- Premium Living (Rentals) -->
      <section x-show="currentPage === 'living'" style="display: none;" x-transition:enter="transition ease-out duration-700 delay-100" x-transition:enter-start="opacity-0 translate-y-10" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-300" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-10" class="pt-10">
        <div class="text-center mb-16">
          <p class="text-luxe-gold font-medium tracking-widest uppercase text-sm mb-3">Exclusive Residences</p>
          <h2 class="font-serif text-4xl md:text-5xl font-bold text-luxe-black" x-text="t.livingTitle"></h2>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
          <template x-for="home in homes" :key="home.id">
            <div class="glass-card p-4 group relative btn-spring cursor-pointer border-gray-100 hover:shadow-luxe-hover transition-all duration-500">
              <div class="relative overflow-hidden rounded-2xl mb-5">
                <img :src="home.image" class="w-full h-64 object-cover transition-transform duration-1000 group-hover:scale-105" alt="Property">
                <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-black/10 to-transparent opacity-60"></div>
                
                <div class="absolute top-4 right-4 bg-white/90 backdrop-blur-md px-3 py-1.5 rounded-lg text-xs font-bold text-luxe-gold shadow-sm">
                  <span x-text="home.growth"></span>
                </div>
              </div>
              
              <div class="px-2 pb-2">
                <div class="flex justify-between items-start mb-2">
                  <h3 class="font-serif text-xl font-bold text-luxe-black" x-text="home.name"></h3>
                </div>
                <p class="text-sm font-medium text-luxe-gray mb-4 flex items-center">
                  <svg class="w-4 h-4 mr-1 text-luxe-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                  <span x-text="home.location"></span>
                </p>
                <div class="flex justify-between items-end border-t border-gray-100 pt-4 mt-2">
                  <div class="flex flex-col">
                    <span class="text-xs text-luxe-gray uppercase tracking-wider mb-1">Monthly</span>
                    <span class="text-xl font-bold text-luxe-black" x-text="`RM ${home.price}`"></span>
                  </div>
                  <span class="text-xs font-semibold text-luxe-gold bg-luxe-gold/10 px-3 py-1.5 rounded-md" x-text="home.type"></span>
                </div>
              </div>
            </div>
          </template>
        </div>
      </section>

      <!-- Private Leisure Suites (Mahjong) -->
      <section x-show="currentPage === 'leisure'" style="display: none;" x-transition:enter="transition ease-out duration-700 delay-100" x-transition:enter-start="opacity-0 translate-y-10" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-300" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-10" class="pt-10">
        <div class="text-center mb-16">
          <p class="text-luxe-gold font-medium tracking-widest uppercase text-sm mb-3">Curated Experiences</p>
          <h2 class="font-serif text-4xl md:text-5xl font-bold text-luxe-black" x-text="t.leisureTitle"></h2>
        </div>
        
        <div class="glass-card p-8 md:p-14 relative overflow-hidden border-gray-100 shadow-luxe">
          <div class="grid md:grid-cols-2 gap-16 items-center">
            
            <div>
              <h3 class="font-serif text-3xl font-bold mb-8 text-luxe-black">Reserve Your Suite</h3>
              <p class="text-luxe-gray mb-6">Experience our fully automated, soundproof mahjong pavilions with complimentary refreshments.</p>
              
              <!-- Horizontal Time Picker -->
              <div class="space-y-4 mb-10">
                <template x-for="time in timeSlots" :key="time">
                  <button @click="selectedTime = time" class="btn-spring w-full text-left px-6 py-4 rounded-xl border transition-all duration-300 flex justify-between items-center" :class="selectedTime === time ? 'bg-luxe-black text-white border-luxe-black shadow-md' : 'bg-white border-gray-200 text-luxe-gray hover:border-gray-300'">
                    <span class="font-medium" x-text="time"></span>
                    <div class="w-5 h-5 rounded-full border-2 flex items-center justify-center" :class="selectedTime === time ? 'border-luxe-gold' : 'border-gray-300'">
                      <div x-show="selectedTime === time" class="w-2.5 h-2.5 rounded-full bg-luxe-gold"></div>
                    </div>
                  </button>
                </template>
              </div>
              
              <button @click="bookSuite" class="btn-spring w-full bg-luxe-gold text-white font-medium py-4 rounded-xl shadow-lg hover:shadow-xl hover:bg-luxe-gold-dark transition-all">
                Confirm Reservation
              </button>
            </div>
            
            <!-- Apple Wallet Style Voucher -->
            <div class="flex justify-center items-center">
              <div class="w-80 h-[420px] rounded-[2rem] p-8 flex flex-col justify-between transition-all duration-700 transform relative overflow-hidden" :class="bookingSuccess ? 'opacity-100 scale-100 bg-luxe-black text-white shadow-2xl' : 'opacity-50 scale-95 bg-gray-100 border border-dashed border-gray-300'">
                
                <!-- Background pattern for voucher -->

    document.addEventListener('alpine:init', () => {

        currentLang: 'zh',
        get t() { return translations[this.currentLang]; },

        phoneNumber: '',
        topupAmount: 30,
        telcoColor: '#1C1C1C',
        detectTelco() {
          const num = this.phoneNumber;
          if(num.startsWith('012') || num.startsWith('017')) this.telcoColor = '#00A859'; // Maxis
          else if(num.startsWith('016') || num.startsWith('014')) this.telcoColor = '#FFCC00'; // Digi
          else if(num.startsWith('019') || num.startsWith('013')) this.telcoColor = '#00B9E8'; // Celcom

        ],

        // Leisure State
        timeSlots: ['14:00 - 18:00 (Afternoon Tea)', '19:00 - 23:00 (Evening)', '00:00 - 04:00 (Night Owl)'],
        selectedTime: '19:00 - 23:00 (Evening)',
        bookingSuccess: false,
        bookSuite() {
          if (this.bookingSuccess) return;
          // Simulate loading then success
          setTimeout(() => {
            this.bookingSuccess = true;
          }, 400);
        },

        initApp() {
          // Reveal on scroll setup
          const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                entry.target.classList.add('active');
              }
            });
          }, { threshold: 0.1 });

          document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
          
          // Staggered fade-in for initial load
          setTimeout(() => {
            document.querySelectorAll('.reveal').forEach((el, i) => {
              if(i === 0) el.classList.add('active'); // show first section
            });
          }, 100);
        }
      }))
    });
